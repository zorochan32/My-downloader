name: 🧠 Smart Downloader v2

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک دانلود (Pixeldrain, Gofile, یا مستقیم)'
        required: true
        type: string
      split_mb:
        description: 'تقسیم به قطعه‌های چند MB؟ (0 = تقسیم نشه)'
        required: false
        default: 90
        type: number

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip curl jq wget
          mkdir -p downloads

      - name: 🔍 Extract Download Info
        run: |
          URL="${{ github.event.inputs.url }}"
          
          echo "🔗 URL: $URL"
          
          # Extract File ID from any Pixeldrain URL format
          if echo "$URL" | grep -qi "pixeldrain"; then
            FILE_ID=$(echo "$URL" | grep -oP '(?:/u/|/api/file/)\K[a-zA-Z0-9]+' | head -1)
            
            if [ -z "$FILE_ID" ]; then
              echo "❌ Could not extract file ID"
              exit 1
            fi
            
            echo "📋 Pixeldrain File ID: $FILE_ID"
            
            # Get file info from API
            echo "🔍 Getting file info..."
            FILE_INFO=$(curl -s "https://pixeldrain.com/api/file/$FILE_ID/info")
            
            # Extract name and size
            FILE_NAME=$(echo "$FILE_INFO" | jq -r '.name // empty')
            if [ -z "$FILE_NAME" ] || [ "$FILE_NAME" = "null" ]; then
              FILE_NAME="file_${FILE_ID}"
            fi
            
            # Clean filename for Windows compatibility
            FILE_NAME=$(echo "$FILE_NAME" | sed 's/[<>:"/\\|?*]/-/g')
            
            echo "📁 Name: $FILE_NAME"
            
            # Direct download URL
            DOWNLOAD_URL="https://pixeldrain.com/api/file/$FILE_ID?download"
            
          elif echo "$URL" | grep -qi "gofile"; then
            # Gofile handling
            FILE_ID=$(echo "$URL" | grep -oP '(?:/d/)\K[a-zA-Z0-9]+')
            API_INFO=$(curl -s "https://api.gofile.io/getContent?contentId=$FILE_ID")
            DOWNLOAD_URL=$(echo "$API_INFO" | jq -r '.data.contents[].link // empty' | head -1)
            FILE_NAME=$(echo "$API_INFO" | jq -r '.data.contents[].name // "download"' | head -1)
            
          else
            # Direct link
            DOWNLOAD_URL="$URL"
            FILE_NAME=$(basename "$URL" | cut -d'?' -f1)
          fi
          
          echo "🔗 Download URL: ${DOWNLOAD_URL:0:100}..."
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV

      - name: ⬇️ Download with Aria2
        run: |
          URL="${{ env.DOWNLOAD_URL }}"
          NAME="${{ env.FILE_NAME }}"
          
          echo "⬇️ Downloading: $NAME"
          echo ""
          
          # Download with aria2c with proper headers
          aria2c \
            --split=16 \
            --max-connection-per-server=16 \
            --min-split-size=1M \
            --max-tries=10 \
            --retry-wait=10 \
            --timeout=60 \
            --connect-timeout=30 \
            --header="User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --dir="downloads" \
            --out="$NAME" \
            --allow-overwrite=true \
            --continue=true \
            "$URL" 2>&1 | grep -E "(\[#|Download|download|OK|ERR)"
          
          # Verify download
          if [ -f "downloads/$NAME" ]; then
            SIZE=$(stat -c%s "downloads/$NAME" 2>/dev/null || echo 0)
            echo ""
            echo "📦 Downloaded: $(( SIZE / 1024 / 1024 ))MB"
            
            # Check if it's an HTML/JSON error page (pixeldrain sometimes returns errors)
            if [ $SIZE -lt 10000 ]; then
              echo "⚠️ File too small, might be error page. Checking..."
              head -c 500 "downloads/$NAME"
              
              # Try alternative URL format
              if grep -q "error\|html\|json" "downloads/$NAME" 2>/dev/null; then
                echo "🔄 Retrying with different URL format..."
                rm "downloads/$NAME"
                
                FILE_ID=$(echo "$URL" | grep -oP '[a-zA-Z0-9]+(?=\?)')
                NEW_URL="https://pixeldrain.com/api/file/${FILE_ID}?download"
                
                curl -L -H "User-Agent: Mozilla/5.0" -o "downloads/$NAME" "$NEW_URL"
              fi
            fi
          else
            echo "❌ Download failed"
            exit 1
          fi

      - name: 📦 Split Files
        run: |
          SPLIT_MB="${{ github.event.inputs.split_mb }}"
          
          echo "📦 Processing files..."
          echo ""
          
          cd downloads
          
          # Only process new files (created in last 5 minutes)
          for FILE in $(find . -maxdepth 1 -type f -newer /tmp -name "*" | sed 's|^./||'); do
            [ -z "$FILE" ] && continue
            
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
            SIZE_MB=$(( SIZE / 1024 / 1024 ))
            
            if [ $SIZE -lt 10000 ]; then
              echo "⏭️  Skipping small file: $FILE ($SIZE bytes)"
              continue
            fi
            
            echo "📁 $FILE ($SIZE_MB MB)"
            
            if [ "$SPLIT_MB" != "0" ] && [ $SIZE -gt $(( SPLIT_MB * 1024 * 1024 )) ]; then
              echo "   ✂️ Splitting into ${SPLIT_MB}MB parts..."
              zip -0 -s "${SPLIT_MB}m" "${FILE}.zip" "$FILE"
              rm "$FILE"
              echo "   ✅ Done"
            fi
          done
          
          echo ""
          echo "📋 Files in downloads/:"
          ls -lhS

      - name: 📤 Commit to Repository
        run: |
          # Check if there are files to upload
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          
          git pull --rebase origin ${{ github.ref_name }} 2>/dev/null || true
          
          # Find new files
          NEW_FILES=$(git ls-files --others --exclude-standard downloads/ 2>/dev/null)
          
          if [ -z "$NEW_FILES" ]; then
            echo "❌ No new files found!"
            echo "Current downloads/:"
            ls -la downloads/
            exit 1
          fi
          
          # Count files
          TOTAL=$(echo "$NEW_FILES" | wc -l)
          echo "📤 Uploading $TOTAL file(s)..."
          echo "$NEW_FILES"
          echo ""
          
          # Upload in batches
          COUNTER=0
          BATCH_NUM=1
          
          echo "$NEW_FILES" | while read -r FILE; do
            [ -z "$FILE" ] && continue
            
            git add "$FILE"
            COUNTER=$((COUNTER + 1))
            
            if [ $((COUNTER % 5)) -eq 0 ] || [ $COUNTER -eq $TOTAL ]; then
              echo "📤 Batch $BATCH_NUM ($COUNTER/$TOTAL)"
              git commit -m "📥 [SmartDL] Part $BATCH_NUM [skip ci]" 2>/dev/null || true
              git push origin ${{ github.ref_name }} 2>/dev/null
              sleep 2
              BATCH_NUM=$((BATCH_NUM + 1))
            fi
          done
          
          echo "✅ Upload complete!"
