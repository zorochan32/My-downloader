name: 🧠 Smart Downloader (API + Direct)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک دانلود (مستقیم یا API مثل pixeldrain)'
        required: true
        type: string
      service:
        description: 'نوع لینک'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - direct
          - pixeldrain
          - gofile
          - mediafire
          - mega
      split_mb:
        description: 'تقسیم فایل‌ها به قطعه‌های چند MB؟'
        required: false
        default: 90
        type: number

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip curl jq wget python3-pip
          pip install --quiet yt-dlp 2>/dev/null || true
          
          mkdir -p downloads tmp

      - name: 🔍 Analyze URL
        run: |
          URL="${{ github.event.inputs.url }}"
          SERVICE="${{ github.event.inputs.service }}"
          
          echo "🔗 Input URL: $URL"
          echo "🏷️  Service: $SERVICE"
          echo ""
          
          # Auto-detect service if set to auto
          if [ "$SERVICE" = "auto" ]; then
            case "$URL" in
              *pixeldrain.com*)
                SERVICE="pixeldrain"
                ;;
              *gofile.io*)
                SERVICE="gofile"
                ;;
              *mediafire.com*)
                SERVICE="mediafire"
                ;;
              *mega.nz*)
                SERVICE="mega"
                ;;
              *.zip|*.mp4|*.rar|*.7z|*.exe|*.apk)
                SERVICE="direct"
                ;;
            esac
            echo "🔍 Auto-detected: $SERVICE"
          fi
          
          echo "SERVICE=$SERVICE" >> $GITHUB_ENV

      - name: 📥 Pixeldrain Handler
        if: env.SERVICE == 'pixeldrain'
        run: |
          URL="${{ github.event.inputs.url }}"
          
          echo "🌐 Processing Pixeldrain link..."
          
          # Extract file ID from URL
          # Handle different pixeldrain URL formats:
          # https://pixeldrain.com/api/file/FILEID/info/zip
          # https://pixeldrain.com/u/FILEID
          # https://pixeldrain.com/api/file/FILEID
          
          FILE_ID=$(echo "$URL" | grep -oP '(?:/u/|/api/file/)\K[a-zA-Z0-9]+')
          
          if [ -z "$FILE_ID" ]; then
            echo "❌ Could not extract file ID from URL"
            exit 1
          fi
          
          echo "📋 File ID: $FILE_ID"
          
          # Get file info
          echo "🔍 Fetching file info..."
          FILE_INFO=$(curl -s "https://pixeldrain.com/api/file/$FILE_ID/info")
          
          FILE_NAME=$(echo "$FILE_INFO" | jq -r '.name // "download"')
          FILE_SIZE=$(echo "$FILE_INFO" | jq -r '.size // 0')
          
          echo "📁 File name: $FILE_NAME"
          echo "📏 Size: $(( FILE_SIZE / 1024 / 1024 ))MB"
          
          # Construct direct download URL
          DOWNLOAD_URL="https://pixeldrain.com/api/file/$FILE_ID"
          
          echo "🔗 Direct URL: $DOWNLOAD_URL"
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV

      - name: 📥 Direct Download Handler
        if: env.SERVICE == 'direct'
        run: |
          URL="${{ github.event.inputs.url }}"
          
          echo "📥 Direct download..."
          
          # Extract filename from URL
          FILE_NAME=$(basename "$URL" | sed 's/?.*//')
          echo "📁 Filename: $FILE_NAME"
          
          echo "DOWNLOAD_URL=$URL" >> $GITHUB_ENV
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV

      - name: 📥 Gofile Handler
        if: env.SERVICE == 'gofile'
        run: |
          URL="${{ github.event.inputs.url }}"
          
          echo "🌐 Processing Gofile link..."
          
          # Extract file ID
          FILE_ID=$(echo "$URL" | grep -oP '(?:/d/)\K[a-zA-Z0-9]+')
          
          if [ -z "$FILE_ID" ]; then
            echo "❌ Could not extract file ID"
            exit 1
          fi
          
          # Get file info via API
          echo "🔍 Fetching file info..."
          INFO=$(curl -s "https://api.gofile.io/getContent?contentId=$FILE_ID")
          
          DOWNLOAD_URL=$(echo "$INFO" | jq -r '.data.contents[].downloadLink // empty' | head -1)
          FILE_NAME=$(echo "$INFO" | jq -r '.data.contents[].name // "download"' | head -1)
          
          echo "📁 File: $FILE_NAME"
          echo "🔗 Download URL: ${DOWNLOAD_URL:0:80}..."
          
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV

      - name: ⬇️ Download File
        run: |
          URL="${DOWNLOAD_URL}"
          FILE_NAME="${FILE_NAME:-download}"
          SPLIT_MB="${{ github.event.inputs.split_mb }}"
          
          echo "⬇️ Starting download..."
          echo "🔗 URL: ${URL:0:100}..."
          echo "📁 Saving as: $FILE_NAME"
          echo ""
          
          # Clean filename
          SAFE_NAME=$(echo "$FILE_NAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
          
          # Try aria2c first (faster)
          if aria2c \
            --split=16 \
            --max-connection-per-server=16 \
            --min-split-size=1M \
            --max-tries=5 \
            --retry-wait=5 \
            --dir="tmp" \
            --out="$SAFE_NAME" \
            "$URL" 2>&1 | tail -5; then
            
            echo "✅ Download complete with aria2"
            
          else
            echo "⚠️ aria2 failed, trying curl..."
            
            # Fallback to curl
            curl -L --retry 5 --retry-delay 5 -o "tmp/$SAFE_NAME" "$URL" 2>&1
            
            if [ -f "tmp/$SAFE_NAME" ]; then
              echo "✅ Download complete with curl"
            else
              echo "❌ All download methods failed"
              exit 1
            fi
          fi
          
          # Move to downloads
          mv "tmp/$SAFE_NAME" "downloads/$SAFE_NAME" 2>/dev/null || true
          
          # Check file
          if [ -f "downloads/$SAFE_NAME" ]; then
            SIZE=$(stat -c%s "downloads/$SAFE_NAME")
            echo ""
            echo "📦 File size: $(( SIZE / 1024 / 1024 ))MB"
          fi
          
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV

      - name: 📦 Process & Split
        run: |
          SPLIT_MB="${{ github.event.inputs.split_mb }}"
          
          cd downloads
          
          for FILE in *; do
            [ -f "$FILE" ] || continue
            
            SIZE=$(stat -c%s "$FILE")
            SIZE_MB=$(( SIZE / 1024 / 1024 ))
            
            echo "📁 $FILE ($SIZE_MB MB)"
            
            if [ "$SPLIT_MB" != "0" ] && [ $SIZE -gt $(( SPLIT_MB * 1024 * 1024 )) ]; then
              echo "   ✂️ Splitting into ${SPLIT_MB}MB parts..."
              
              # Create zip with split
              zip -0 -s "${SPLIT_MB}m" "${FILE}.zip" "$FILE"
              rm "$FILE"
              
              PART_COUNT=$(ls "${FILE}.zip".z* 2>/dev/null | wc -l)
              echo "   ✅ $PART_COUNT parts created"
            fi
          done
          
          echo ""
          echo "📋 Final files:"
          ls -lh

      - name: 📤 Upload to Repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          
          git pull --rebase origin ${{ github.ref_name }} 2>/dev/null || true
          
          git add downloads/
          
          if git diff --staged --quiet; then
            echo "No new files to upload"
            exit 0
          fi
          
          # Count and commit
          TOTAL=$(git diff --staged --name-only | wc -l)
          echo "📤 Uploading $TOTAL files..."
          
          # Commit in batches of 5
          for ((i=0; i<TOTAL; i+=5)); do
            BATCH=$((i/5 + 1))
            git commit -m "📥 [SmartDL] Download batch $BATCH [skip ci]" 2>/dev/null || true
            git push origin ${{ github.ref_name }} 2>/dev/null
            [ $? -ne 0 ] && git pull --rebase && git push
            sleep 2
          done
          
          echo ""
          echo "╔══════════════════════════════════╗"
          echo "║   ✅ Download Complete!         ║"
          echo "╚══════════════════════════════════╝"
