name: 🎬 YouTube Download with Cookies

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true
        type: string
      quality:
        description: 'کیفیت'
        required: false
        default: '720'
        type: choice
        options:
          - '360'
          - '480'
          - '720'
          - '1080'
      split_mb:
        description: 'تقسیم به قطعه‌های چند MB؟ (0 = تقسیم نشه)'
        required: false
        default: 90
        type: number

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip ffmpeg python3-pip
          
          # Install Deno (needed by newer yt-dlp)
          curl -fsSL https://deno.land/install.sh | sh -s -- -y 2>/dev/null || true
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          
          pip install --quiet --upgrade yt-dlp
          
          echo "✅ yt-dlp $(yt-dlp --version)"

      - name: 🍪 Setup Cookies
        run: |
          # Save cookies from secret
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
          
          # Verify cookies file
          if [ -s cookies.txt ]; then
            echo "✅ Cookies loaded ($(wc -l < cookies.txt) lines)"
            head -3 cookies.txt
          else
            echo "⚠️ No cookies found! Will try without..."
          fi

      - name: ⬇️ Download Video
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          
          echo "🎬 Starting download..."
          echo "🔗 URL: $URL"
          echo ""
          
          mkdir -p downloads
          
          # Try with cookies
          if [ -f cookies.txt ]; then
            echo "📥 Attempt 1: With cookies..."
            
            yt-dlp \
              --cookies cookies.txt \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              --extractor-args "youtube:player_client=android,web" \
              --no-playlist \
              --format "bestvideo[height<=${QUALITY}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${QUALITY}]/best" \
              --merge-output-format mp4 \
              --output "downloads/video.mp4" \
              --no-warnings \
              "$URL" 2>&1 | tail -10
              
            if [ -f downloads/video.mp4 ] && [ $(stat -c%s downloads/video.mp4) -gt 1000000 ]; then
              echo "✅ SUCCESS with cookies!"
              echo "DOWNLOADED=true" >> $GITHUB_ENV
            fi
          fi
          
          # Fallback: Try without cookies but with different methods
          if [ "${DOWNLOADED}" != "true" ]; then
            echo "📥 Attempt 2: Direct download..."
            
            yt-dlp \
              --user-agent "com.google.android.youtube/19.29.37 (Linux; U; Android 14) gzip" \
              --extractor-args "youtube:player_client=android,ios" \
              --no-playlist \
              --format "best[height<=720]" \
              --output "downloads/video.%(ext)s" \
              --no-warnings \
              "$URL" 2>&1 | tail -10 || {
                
                echo "📥 Attempt 3: Last resort..."
                yt-dlp \
                  --format "best[height<=480]" \
                  --no-playlist \
                  --output "downloads/video.%(ext)s" \
                  "$URL" 2>&1 | tail -10
              }
          fi
          
          echo ""
          echo "📋 Results:"
          ls -lh downloads/ 2>/dev/null || echo "No files"

      - name: 📦 Split if needed
        if: success()
        run: |
          SPLIT_MB="${{ github.event.inputs.split_mb }}"
          
          cd downloads
          
          for FILE in *; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            echo "📁 $FILE ($(( SIZE / 1024 / 1024 ))MB)"
            
            if [ "$SPLIT_MB" != "0" ] && [ $SIZE -gt $(( SPLIT_MB * 1024 * 1024 )) ]; then
              echo "   ✂️ Splitting into ${SPLIT_MB}MB parts..."
              zip -0 -s "${SPLIT_MB}m" "${FILE}.zip" "$FILE"
              rm "$FILE"
            fi
          done
          
          ls -lh

      - name: 📤 Upload
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          
          git pull --rebase origin ${{ github.ref_name }} 2>/dev/null || true
          git add downloads/
          
          if git diff --staged --quiet; then
            echo "No new files"
            exit 0
          fi
          
          TOTAL=$(git diff --staged --name-only | wc -l)
          echo "📤 Uploading $TOTAL files..."
          
          for ((i=1; i<=TOTAL; i+=5)); do
            git commit -m "📹 YouTube download [skip ci]" 2>/dev/null || true
            git push origin ${{ github.ref_name }}
            sleep 2
          done
          
          echo "✅ Complete!"
