name: 🎬 YouTube via Invidious Proxy

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true
        type: string
      quality:
        description: 'کیفیت (پیشنهاد: 720)'
        required: false
        default: '720'
        type: choice
        options:
          - '360'
          - '480'
          - '720'
          - '1080'
      split_mb:
        description: 'تقسیم به قطعه‌های چند مگابایتی؟ (0 = تقسیم نشه)'
        required: false
        default: 90
        type: number

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Install Tools
        run: |
          echo "📦 Installing packages..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip ffmpeg python3-pip curl jq wget
          
          pip install --quiet --upgrade yt-dlp
          echo "✅ yt-dlp: $(yt-dlp --version)"

      - name: 🔄 Extract YouTube ID & Find Proxy
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          
          echo "🔗 Original URL: $URL"
          
          # Extract video ID from various YouTube URL formats
          if echo "$URL" | grep -q "youtu.be/"; then
            VIDEO_ID=$(echo "$URL" | sed 's|.*youtu.be/||;s|[?&/].*||')
          else
            VIDEO_ID=$(echo "$URL" | sed -n 's/.*[?&]v=\([^&]*\).*/\1/p')
          fi
          
          echo "📹 Video ID: $VIDEO_ID"
          
          if [ -z "$VIDEO_ID" ]; then
            echo "❌ Could not extract video ID"
            exit 1
          fi
          
          echo "VIDEO_ID=$VIDEO_ID" >> $GITHUB_ENV
          
          # List of working Invidious instances (updated)
          PROXY_LIST=(
            "https://vid.puffyan.us"
            "https://invidious.slipfox.xyz"
            "https://yewtu.be"
            "https://invidious.snopyta.org"
            "https://invidious.namazso.eu"
            "https://inv.nadeko.net"
            "https://invidious.sethforprivacy.com"
            "https://vid.privatevoid.net"
            "https://invidious.lidarshield.cloud"
          )
          
          # Find working proxy
          echo "🔍 Finding working Invidious proxy..."
          for PROXY in "${PROXY_LIST[@]}"; do
            echo -n "  Testing $PROXY ... "
            if curl -s --max-time 10 "$PROXY/api/v1/videos/$VIDEO_ID" > /tmp/video_info.json 2>/dev/null; then
              TITLE=$(jq -r '.title // empty' /tmp/video_info.json 2>/dev/null)
              if [ ! -z "$TITLE" ]; then
                echo "✅"
                echo "WORKING_PROXY=$PROXY" >> $GITHUB_ENV
                echo "VIDEO_TITLE=$TITLE" >> $GITHUB_ENV
                echo "📹 Title: $TITLE"
                break
              else
                echo "❌ (no data)"
              fi
            else
              echo "❌ (unreachable)"
            fi
          done
          
          if [ -z "$WORKING_PROXY" ]; then
            echo "❌ No working proxy found. Trying direct yt-dlp..."
            echo "FALLBACK=true" >> $GITHUB_ENV
          else
            echo "FALLBACK=false" >> $GITHUB_ENV
          fi

      - name: ⬇️ Download via Proxy or Direct
        run: |
          VIDEO_ID="${{ env.VIDEO_ID }}"
          QUALITY="${{ github.event.inputs.quality }}"
          WORKING_PROXY="${{ env.WORKING_PROXY }}"
          FALLBACK="${{ env.FALLBACK }}"
          
          mkdir -p downloads
          
          if [ "$FALLBACK" = "false" ] && [ ! -z "$WORKING_PROXY" ]; then
            echo "🌐 Using Invidious Proxy: $WORKING_PROXY"
            echo ""
            
            # Method 1: Download via Invidious API
            echo "📥 Method 1: Invidious API direct download..."
            
            # Get direct video URL from Invidious
            INVIDIOUS_VIDEO_URL="${WORKING_PROXY}/latest_version?id=${VIDEO_ID}&itag=22"
            
            # Try downloading with different formats
            for ITAG in 22 18 37 136 247 135; do
              echo -n "  Trying format $ITAG ... "
              INVIDIOUS_URL="${WORKING_PROXY}/latest_version?id=${VIDEO_ID}&itag=${ITAG}"
              
              if curl -L -s --max-time 300 "$INVIDIOUS_URL" -o "downloads/video.mp4" 2>/dev/null; then
                SIZE=$(stat -c%s downloads/video.mp4 2>/dev/null || echo 0)
                if [ $SIZE -gt 1000000 ]; then
                  echo "✅ Downloaded $(( SIZE / 1024 / 1024 ))MB"
                  echo "DOWNLOAD_SUCCESS=true" >> $GITHUB_ENV
                  break
                else
                  echo "❌ Too small ($SIZE bytes)"
                  rm -f downloads/video.mp4
                fi
              else
                echo "❌ Failed"
              fi
            done
            
          fi
          
          # If proxy failed, try yt-dlp directly
          if [ ! -f downloads/video.mp4 ] || [ $(stat -c%s downloads/video.mp4 2>/dev/null || echo 0) -lt 1000000 ]; then
            echo ""
            echo "🔄 Falling back to yt-dlp direct download..."
            
            # Construct full YouTube URL
            YT_FULL_URL="https://www.youtube.com/watch?v=$VIDEO_ID"
            
            yt-dlp \
              --user-agent "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" \
              --format "best[height<=${QUALITY}]/best" \
              --no-playlist \
              --output "downloads/video.%(ext)s" \
              --merge-output-format mp4 \
              --no-warnings \
              "$YT_FULL_URL" 2>&1 || {
                echo "❌ yt-dlp also failed"
                
                # Last resort: try youtube.com directly with curl
                echo "🔄 Last resort: direct curl..."
                yt-dlp \
                  --get-url \
                  --format "best[height<=${QUALITY}]" \
                  --no-playlist \
                  "$YT_FULL_URL" 2>/dev/null | while read -r DL_URL; do
                    if [ ! -z "$DL_URL" ]; then
                      echo "  Downloading from: ${DL_URL:0:80}..."
                      aria2c -x16 -s16 -d downloads -o "video.mp4" "$DL_URL" && break
                    fi
                  done
              }
          fi
          
          # Check result
          echo ""
          echo "📋 Downloaded files:"
          ls -lh downloads/ 2>/dev/null || echo "  No files found"
          
          if [ -z "$(ls -A downloads/ 2>/dev/null)" ]; then
            echo "❌ Download completely failed"
            exit 1
          fi
          
          echo "DOWNLOAD_SUCCESS=true" >> $GITHUB_ENV

      - name: 📦 Process & Split Files
        run: |
          SPLIT_MB="${{ github.event.inputs.split_mb }}"
          
          echo "📦 Processing files..."
          cd downloads
          
          for FILE in *; do
            [ -f "$FILE" ] || continue
            
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
            SIZE_MB=$(( SIZE / 1024 / 1024 ))
            
            echo "📁 $FILE ($SIZE_MB MB)"
            
            if [ "$SPLIT_MB" != "0" ] && [ "$SIZE" -gt $(( SPLIT_MB * 1024 * 1024 )) ]; then
              echo "   ✂️ Splitting into ${SPLIT_MB}MB parts..."
              zip -0 -s "${SPLIT_MB}m" "${FILE}.zip" "$FILE"
              rm "$FILE"
              PART_COUNT=$(ls "${FILE}".zip.z* 2>/dev/null | wc -l)
              echo "   ✅ Created $PART_COUNT parts"
            fi
          done
          
          echo ""
          echo "📋 Final files:"
          ls -lh

      - name: 📤 Commit to Repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          
          # Pull latest
          git pull --rebase origin ${{ github.ref_name }} 2>/dev/null || true
          
          # Add new files
          git add downloads/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Count files
          FILE_COUNT=$(git diff --staged --name-only | grep downloads/ | wc -l)
          
          # Commit in batches
          BATCH_SIZE=5
          COMMITTED=0
          
          for ((i=0; i<$FILE_COUNT; i+=BATCH_SIZE)); do
            FILES_TO_COMMIT=$(git diff --staged --name-only | grep downloads/ | head -$((i+BATCH_SIZE)) | tail -$BATCH_SIZE)
            
            if [ ! -z "$FILES_TO_COMMIT" ]; then
              echo "$FILES_TO_COMMIT" | while read -r f; do
                git add "$f"
              done
              
              git commit -m "📹 [YouTube] Download batch $((i/BATCH_SIZE + 1)) [skip ci]" 2>/dev/null || true
              git push origin ${{ github.ref_name }}
              COMMITTED=$((COMMITTED + BATCH_SIZE))
              sleep 2
            fi
          done
          
          echo ""
          echo "╔══════════════════════════════════╗"
          echo "║   ✅ Upload Complete!           ║"
          echo "╚══════════════════════════════════╝"
