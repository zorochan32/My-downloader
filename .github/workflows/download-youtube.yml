name: 🎬 دانلود از یوتیوب + ذخیره در ریپو

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true
        type: string
      mode:
        description: 'حالت دانلود'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      split_threshold_mb:
        description: 'تقسیم فایل‌های بزرگتر از این مقدار (MB) - 0 یعنی تقسیم نشه'
        required: false
        default: 90
        type: number

jobs:
  youtube-download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: نصب ابزارهای مورد نیاز
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip
          python3 -m pip install --upgrade pip
          pip install --upgrade yt-dlp
          echo "✅ yt-dlp version: $(yt-dlp --version)"

      - name: 🏷️ AVASAM YouTube Downloader
        run: |
          echo "🏷️  AVASAM - YouTube Download Solution"
          echo "🌐 https://avasam.ir"
          echo "📅 $(date)"
          echo ""

      - name: 🎯 استخراج لینک مستقیم از یوتیوب
        id: get_url
        run: |
          YT_URL="${{ github.event.inputs.youtube_url }}"
          echo "🔗 لینک دریافتی: $YT_URL"
          echo ""
          
          # اول چک می‌کنیم ببینیم اصلاً yt-dlp می‌تونه ویدیو رو تشخیص بده
          echo "🔍 در حال بررسی ویدیو..."
          VIDEO_INFO=$(yt-dlp --dump-json --no-playlist "$YT_URL" 2>/tmp/yt-error.log)
          YT_EXIT_CODE=$?
          
          if [ $YT_EXIT_CODE -ne 0 ]; then
            echo "❌ خطا در پردازش لینک یوتیوب:"
            cat /tmp/yt-error.log
            echo ""
            echo "🔸 راه‌حل‌های احتمالی:"
            echo "  1. لینک رو چک کن (باید شبیه https://www.youtube.com/watch?v=XXXXX باشه)"
            echo "  2. ویدیو ممکنه خصوصی یا محدود به منطقه باشه"
            echo "  3. دوباره تلاش کن (محدودیت موقت یوتیوب)"
            exit 1
          fi
          
          VIDEO_TITLE=$(echo "$VIDEO_INFO" | python3 -c "import sys, json; print(json.load(sys.stdin)['title'])" 2>/dev/null)
          echo "📹 عنوان ویدیو: $VIDEO_TITLE"
          echo ""
          
          # گرفتن لینک مستقیم - اول فرمت mp4 با کیفیت بالا
          echo "🎯 در حال استخراج لینک مستقیم..."
          DIRECT_URL=$(yt-dlp -f "bestvideo[ext=mp4][height<=1080]+bestaudio[ext=m4a]/best[ext=mp4]/best" -g "$YT_URL" 2>/tmp/yt-url-error.log)
          URL_EXIT_CODE=$?
          
          if [ $URL_EXIT_CODE -ne 0 ] || [ -z "$DIRECT_URL" ]; then
            echo "⚠️ روش اول جواب نداد، روش دوم رو امتحان می‌کنم..."
            # روش دوم: هر چی که در دسترسه
            DIRECT_URL=$(yt-dlp -f "best" -g "$YT_URL" 2>/tmp/yt-url-error2.log)
            URL_EXIT_CODE=$?
          fi
          
          if [ $URL_EXIT_CODE -ne 0 ] || [ -z "$DIRECT_URL" ]; then
            echo "❌ نتونستم لینک مستقیم رو استخراج کنم:"
            cat /tmp/yt-url-error.log 2>/dev/null
            cat /tmp/yt-url-error2.log 2>/dev/null
            exit 1
          fi
          
          echo "✅ لینک مستقیم با موفقیت استخراج شد."
          echo "direct_url=${DIRECT_URL}" >> $GITHUB_OUTPUT
          echo "video_title=${VIDEO_TITLE}" >> $GITHUB_OUTPUT

      - name: ⬇️ دانلود ویدیو با aria2
        run: |
          MODE="${{ github.event.inputs.mode }}"
          DIRECT_URL="${{ steps.get_url.outputs.direct_url }}"
          VIDEO_TITLE="${{ steps.get_url.outputs.video_title }}"
          SPLIT_THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))
          
          echo "🏷️  AVASAM (https://avasam.ir)"
          echo "⬇️ در حال دانلود: $VIDEO_TITLE"
          
          # تمیز کردن اسم فایل
          SAFE_TITLE=$(echo "$VIDEO_TITLE" | sed 's/[^a-zA-Z0-9آ-ی۰-۹_ -]//g' | sed 's/ /_/g')
          FILENAME="${SAFE_TITLE}.mp4"
          
          mkdir -p downloads tmp_downloads
          
          echo "📥 نام فایل: $FILENAME"
          echo "🔗 لینک دانلود: ${DIRECT_URL:0:100}..."
          echo ""
          
          # دانلود با تنظیمات بهینه
          aria2c \
            --split=16 \
            --max-connection-per-server=16 \
            --min-split-size=1M \
            --max-tries=5 \
            --retry-wait=5 \
            --timeout=30 \
            --connect-timeout=10 \
            --dir="tmp_downloads" \
            --out="$FILENAME" \
            "$DIRECT_URL"
          
          # پردازش فایل دانلود شده مثل Workflow اصلی
          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="downloads/${SAFE_TITLE}_$(date +%Y%m%d_%H%M%S).zip"
            echo "📦 ایجاد آرشیو zip: $ARCHIVE_NAME"
            zip -j "$ARCHIVE_NAME" tmp_downloads/*
            rm -rf tmp_downloads
          else
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue
              SIZE=$(stat -c%s "$FILE")
              BASENAME=$(basename "$FILE")
              
              if [ "$SPLIT_THRESHOLD_BYTES" -gt 0 ] && [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                echo "✂️ $BASENAME حجمش $(( SIZE / 1024 / 1024 ))MB هست — تقسیم به قطعه‌های ${SPLIT_THRESHOLD_MB}MB"
                zip -0 -s "${SPLIT_THRESHOLD_MB}m" "downloads/${BASENAME}.zip" -j "$FILE"
                echo "✅ تعداد قطعه‌ها: $(ls downloads/${BASENAME}.z* 2>/dev/null | wc -l)"
              else
                cp "$FILE" "downloads/$BASENAME"
              fi
            done
            rm -rf tmp_downloads
          fi
          
          echo "✅ دانلود و پردازش تموم شد."

      - name: 📤 ذخیره‌سازی در گیت‌هاب (AVASAM)
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          echo "🏷️  AVASAM (https://avasam.ir) - ذخیره‌سازی فایل‌ها"
          
          mapfile -t ALL_FILES < <(git ls-files --others --modified --exclude-standard downloads/)
          
          TOTAL=${#ALL_FILES[@]}
          echo "📦 تعداد کل فایل‌های جدید: $TOTAL"
          
          if [ "$TOTAL" -eq 0 ]; then
            echo "ℹ️ فایل جدیدی برای ذخیره وجود نداره."
            exit 0
          fi
          
          BATCH_SIZE=5
          BATCH_NUM=0
          
          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")
            
            echo "🚀 ذخیره گروه $BATCH_NUM: فایل‌های $((i+1)) تا $(( i + ${#BATCH[@]} )) از $TOTAL"
            
            git add "${BATCH[@]}"
            git commit -m "[AVASAM] 🎬 دانلود از یوتیوب — $(date +'%Y-%m-%d %H:%M') [skip ci]"
            
            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"
            
            echo "✅ گروه $BATCH_NUM ذخیره شد"
          done
          
          echo "🎉 همه $TOTAL فایل در $BATCH_NUM گروه ذخیره شدن"
          echo "🏷️  AVASAM - https://avasam.ir"
