name: 🎬 دانلود از یوتیوب + ذخیره در ریپو

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'لینک ویدیوی یوتیوب (فقط ویدیوی تکی، نه پلی‌لیست)'
        required: true
        type: string
      mode:
        description: 'حالت دانلود'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      split_threshold_mb:
        description: 'تقسیم فایل‌های بزرگتر از این مقدار (MB) - 0 یعنی تقسیم نشه'
        required: false
        default: 90
        type: number

jobs:
  youtube-download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: نصب ابزارهای مورد نیاز
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip ffmpeg
          python3 -m pip install --upgrade pip
          pip install --upgrade yt-dlp
          echo "✅ yt-dlp version: $(yt-dlp --version)"
          echo "✅ ffmpeg version: $(ffmpeg -version | head -n1)"

      - name: 🎯 استخراج و دانلود از یوتیوب
        run: |
          YT_URL="${{ github.event.inputs.youtube_url }}"
          MODE="${{ github.event.inputs.mode }}"
          SPLIT_THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          
          echo "🏷️  AVASAM - YouTube Download Solution"
          echo "🌐 https://avasam.ir"
          echo "🔗 لینک: $YT_URL"
          echo ""
          
          # حذف پارامترهای اضافی مثل list= از لینک
          CLEAN_URL=$(echo "$YT_URL" | sed 's/&list=.*//' | sed 's/?list=.*//')
          echo "🔗 لینک تمیز شده: $CLEAN_URL"
          echo ""
          
          mkdir -p downloads
          
          # روش جدید: مستقیماً با yt-dlp دانلود کن، بعد با همون سیستم قبلی پردازش کن
          echo "📥 در حال دانلود با yt-dlp..."
          
          # اول عنوان ویدیو رو می‌گیریم
          VIDEO_TITLE=$(yt-dlp --get-title --no-playlist "$CLEAN_URL" 2>&1)
          if [ $? -ne 0 ]; then
            echo "❌ خطا در دریافت عنوان:"
            echo "$VIDEO_TITLE"
            echo ""
            echo "🔸 نکته: مطمئن شو لینک ویدیوی تکی باشه، نه پلی‌لیست"
            exit 1
          fi
          
          echo "📹 عنوان: $VIDEO_TITLE"
          
          # تمیز کردن اسم فایل
          SAFE_TITLE=$(echo "$VIDEO_TITLE" | sed 's/[^a-zA-Z0-9آ-ی۰-۹_ -]//g' | sed 's/ /_/g' | cut -c1-100)
          
          # دانلود مستقیم با yt-dlp (با فرمت mp4)
          echo "⬇️ در حال دانلود..."
          yt-dlp \
            -f "bestvideo[ext=mp4][height<=1080]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            --no-playlist \
            --merge-output-format mp4 \
            -o "downloads/${SAFE_TITLE}.mp4" \
            "$CLEAN_URL" 2>&1 | tail -20
          
          DOWNLOAD_EXIT=$?
          
          if [ $DOWNLOAD_EXIT -ne 0 ]; then
            echo ""
            echo "❌ خطا در دانلود. کد خروج: $DOWNLOAD_EXIT"
            echo "🔸 در حال تلاش با روش جایگزین..."
            
            # روش جایگزین: دانلود هر فرمتی که باشه
            yt-dlp \
              -f "best" \
              --no-playlist \
              -o "downloads/${SAFE_TITLE}.%(ext)s" \
              "$CLEAN_URL" 2>&1 | tail -20
            
            if [ $? -ne 0 ]; then
              echo "❌ روش جایگزین هم جواب نداد."
              exit 1
            fi
          fi
          
          echo "✅ دانلود تموم شد."
          
          # پیدا کردن فایل دانلود شده
          DOWNLOADED_FILE=$(ls -t downloads/ | head -n1)
          FILE_PATH="downloads/$DOWNLOADED_FILE"
          FILE_SIZE=$(stat -c%s "$FILE_PATH" 2>/dev/null || echo 0)
          
          echo "📦 فایل: $DOWNLOADED_FILE"
          echo "📏 حجم: $(( FILE_SIZE / 1024 / 1024 ))MB"
          
          # اگه حالت zip باشه یا حجم فایل از حد مجاز بیشتر باشه، تقسیمش می‌کنیم
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))
          
          if [ "$MODE" = "zip" ]; then
            echo "📦 ایجاد آرشیو zip..."
            ARCHIVE_NAME="downloads/${SAFE_TITLE}_$(date +%Y%m%d_%H%M%S).zip"
            zip -j "$ARCHIVE_NAME" "$FILE_PATH"
            rm "$FILE_PATH"
            echo "✅ آرشیو ساخته شد: $ARCHIVE_NAME"
            
          elif [ "$SPLIT_THRESHOLD_BYTES" -gt 0 ] && [ "$FILE_SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
            echo "✂️ حجم فایل از ${SPLIT_THRESHOLD_MB}MB بیشتره — تقسیم به قطعه‌های ${SPLIT_THRESHOLD_MB}MB"
            zip -0 -s "${SPLIT_THRESHOLD_MB}m" "${FILE_PATH}.zip" -j "$FILE_PATH"
            rm "$FILE_PATH"
            echo "✅ تعداد قطعه‌ها: $(ls downloads/${DOWNLOADED_FILE}.z* 2>/dev/null | wc -l)"
          fi
          
          echo ""
          echo "📋 فایل‌های موجود در پوشه downloads:"
          ls -lh downloads/

      - name: 📤 ذخیره‌سازی در گیت‌هاب
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          echo "📤 در حال ذخیره‌سازی فایل‌ها..."
          
          # لیست فایل‌های جدید و تغییر یافته
          mapfile -t ALL_FILES < <(git ls-files --others --modified --exclude-standard downloads/)
          
          TOTAL=${#ALL_FILES[@]}
          echo "📦 تعداد فایل‌های جدید: $TOTAL"
          
          if [ "$TOTAL" -eq 0 ]; then
            echo "ℹ️ فایل جدیدی وجود نداره."
            exit 0
          fi
          
          # نمایش فایل‌ها
          for f in "${ALL_FILES[@]}"; do
            echo "  - $f"
          done
          
          # ارسال گروهی (هر 5 تا)
          BATCH_SIZE=5
          BATCH_NUM=0
          
          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")
            
            echo "🚀 گروه $BATCH_NUM: ارسال $((i+1)) تا $(( i + ${#BATCH[@]} )) از $TOTAL"
            
            git add "${BATCH[@]}"
            git commit -m "🎬 [YouTube] ${VIDEO_TITLE:-video} — $(date +'%Y-%m-%d %H:%M')"
            
            git pull --rebase origin "$BRANCH" 2>/dev/null || true
            git push origin HEAD:"$BRANCH"
            
            echo "✅ گروه $BATCH_NUM ذخیره شد"
          done
          
          echo ""
          echo "🎉 همه فایل‌ها با موفقیت ذخیره شدن!"
          echo "🔗 https://github.com/${{ github.repository }}/tree/main/downloads"
